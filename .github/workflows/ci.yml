name: CI

# Local, offline validation only: syntax check + unit tests.
# No RunPod API calls, no GPU, no pod deploy, no secrets, no paid infra.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall scripts

      - name: Run tests
        run: pytest -q
